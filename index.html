<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equipping Pastors Worldwide | Equipping Shepherds, Strengthening the Church</title>
    <meta
      name="description"
      content="Equipping Pastors Worldwide trains and resources pastors on the frontlines of the Global South — so they can preach God's Word faithfully, in their own language, right where they serve." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#082a44" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
    <!--SEO_HEAD-->
    <!-- Gate scroll-reveal styles on JS so no-JS / failed-bundle visitors see all content. -->
    <script>
      document.documentElement.classList.add('reveal-ready')
    </script>
  </head>
  <body>
    <!-- Hidden static form so Netlify's build-time bot reliably detects the
         contact form (the live React form posts to this same name). -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="role" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
